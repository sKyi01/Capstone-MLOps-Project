<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Review Intelligence</title>

<style>

body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
}

.container{
    background:white;
    width:520px;
    padding:35px;
    border-radius:12px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-bottom:5px;
    color:#2c3e50;
}

.subtitle{
    color:#7f8c8d;
    margin-bottom:25px;
}

textarea{
    width:100%;
    padding:14px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:15px;
    resize:none;
}

textarea:focus{
    outline:none;
    border-color:#1f4037;
    box-shadow:0 0 5px rgba(31,64,55,0.4);
}

button{
    margin-top:15px;
    background:#1f4037;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#145a52;
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:6px;
    font-size:20px;
    font-weight:bold;
}

.positive{
    color:#155724;
    background:#d4edda;
    border:1px solid #c3e6cb;
}

.negative{
    color:#721c24;
    background:#f8d7da;
    border:1px solid #f5c6cb;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}

</style>

</head>

<body>

<div class="container">

<h1>Product Review Intelligence</h1>

<p class="subtitle">
Analyze customer feedback and detect sentiment using AI
</p>

<form action="/predict" method="POST">

<label for="text"><strong>Customer Review</strong></label><br><br>

<textarea
id="text"
name="text"
rows="5"
placeholder="Paste a product review here...">
</textarea>

<br>

<button type="submit">
Analyze Review
</button>

</form>

{% if result is not none %}

<div class="result {% if result == 1 %}positive{% else %}negative{% endif %}">

{% if result == 1 %}
👍 Positive Customer Feedback
{% else %}
⚠️ Negative Customer Feedback
{% endif %}

</div>

{% endif %}

<div class="footer">
AI-powered Sentiment Analysis | ML Deployment Project
</div>

</div>

</body>
</html>
